<section class="login-page">
  <div class="auth-card">
    <a routerLink="/" class="login-back-link">← Back to home</a>
    <h2>Log in</h2>

    <form (ngSubmit)="submitLogin()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="password-row">
          <input class="form-control password-input"
                 [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password"
                 name="password"
                 placeholder="••••••••"
                 required
                 autocomplete="current-password" />
          <button class="btn btn-outline-secondary btn-sm toggle-password"
                  type="button"
                  (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>

      <p *ngIf="errorMessage" class="text-danger mb-0">{{ errorMessage }}</p>

      <button class="btn btn-primary" type="submit" [disabled]="submitting">
        <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
        {{ submitting ? 'Logging in…' : 'Log in' }}
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </div>
  </div>
</section>
